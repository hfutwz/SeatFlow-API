server:
  port: 8080

spring:
  application:
    name: seatflow-api
  datasource:
    url: jdbc:mysql://localhost:3306/seatflow?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  mail:
    host: smtp.example.com
    port: 587
    username: noreply@seatflow.edu
    password: changeme
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

mybatis-plus:
  type-aliases-package: com.seatflow.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: changeme-to-a-secure-random-string-at-least-256-bits
  expiration: 86400000  # 24 hours in ms

seatflow:
  max-reservation-hours: 4
  check-in-remind-before-min: 15
  check-in-warn-after-min: 10
  check-in-cancel-after-min: 15

logging:
  level:
    com.seatflow: DEBUG
    com.baomidou.mybatisplus: DEBUG
