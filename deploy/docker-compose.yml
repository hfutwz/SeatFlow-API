version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: seatflow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: seatflow
      TZ: Asia/Shanghai
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - seatflow-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务
  backend:
    build:
      context: ..
      dockerfile: deploy/backend/Dockerfile
    container_name: seatflow-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/seatflow?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_ROOT_PASSWORD:-root123456}
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "${BACKEND_PORT:-8081}:8080"
    networks:
      - seatflow-network
    restart: unless-stopped

  # 前端服务
  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend/Dockerfile
    container_name: seatflow-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - seatflow-network
    restart: unless-stopped

volumes:
  mysql-data:

networks:
  seatflow-network:
    driver: bridge
